# Tailscale exposure via tsdproxy: one proxy joins the tailnet and serves any
# container labelled `tsdproxy.enable: "true"` as its own HTTPS node — no
# per-app sidecars. To expose a new app, put it on the `proxy` network and add
# the tsdproxy.* labels (see dockge below). Node state lives in a named volume
# and the auth key is passed via env, so this works over a remote DOCKER_HOST
# with no host bind mounts.

volumes:
  dockge_data:
    name: dockge_data
  tsdproxy_data:
  aiostreams_data:
  aiomanager_data:
  aiometadata_data:
  aiometadata_redis_data:
  watchly_redis_data:
  homepage_config:
  dozzle_data:
  wud_data:
  pihole_data:

networks:
  proxy:

# tsdproxy config injected as a file (not a host bind mount, so it still works
# over a remote DOCKER_HOST). The key setting is tryDockerInternalNetwork: true
# — without it tsdproxy reaches targets via host.docker.internal and the host's
# published port, but our apps only `expose` their port on the `proxy` network
# (nothing is published to the host), so it 502s. With it enabled, tsdproxy
# connects to the container's internal IP on the shared proxy network directly.
configs:
  tsdproxy_config:
    content: |
      defaultProxyProvider: default
      docker:
        local:
          host: unix:///var/run/docker.sock
          targetHostname: host.docker.internal
          tryDockerInternalNetwork: true
          defaultProxyProvider: default
      tailscale:
        providers:
          default:
            clientId: ${TS_CLIENT_ID:?set TS_CLIENT_ID in .env}
            clientSecret: ${TS_CLIENT_SECRET:?set TS_CLIENT_SECRET in .env}
            tags: "tag:homelab" # Optional if tags are defined in each proxy
        dataDir: /data/
      http:
        hostname: 0.0.0.0
        port: 8080
      log:
        level: info

  # Homepage reads its config from /app/config. We inject the two files that
  # matter declaratively (the rest are auto-created as empty defaults at
  # startup) so this works over a remote DOCKER_HOST with no host bind mounts.
  # docker.yaml points homepage at the host's docker socket; every container
  # carrying homepage.* labels is then auto-discovered — no services.yaml entries.
  homepage_docker:
    content: |
      my-docker:
        socket: /var/run/docker.sock
  homepage_settings:
    content: |
      title: Intranet
      headerStyle: clean
      layout:
        Infrastructure:
          style: row
          columns: 3
        Media:
          style: row
          columns: 3
  # Override the bundled sample files so their placeholder "My First Service"
  # entries don't show up — everything real comes from docker label discovery.
  homepage_services:
    content: |
      # Services are discovered from docker labels; nothing static here.
  homepage_bookmarks:
    content: |
      []

services:
  tsdproxy:
    image: almeidapaulopt/tsdproxy:2
    container_name: tsdproxy
    restart: unless-stopped
    networks:
      - proxy
    # WUD: the "2" tag floats across 2.x releases, so track it by digest.
    labels:
      wud.watch.digest: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - tsdproxy_data:/data
    # Lets tsdproxy resolve the Docker host gateway as a fallback target route.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # /config/tsdproxy.yaml is tsdproxy's default config path. The auth key is
    # only used at first registration; the tailnet node then persists in
    # tsdproxy_data (dataDir: /data) so it stays authenticated across restarts.
    configs:
      - source: tsdproxy_config
        target: /config/tsdproxy.yaml

  dockge:
    image: louislam/dockge:1
    container_name: dockge
    # Disabled: only runs when the "extras" profile is enabled
    # (`docker compose --profile extras up -d`).
    profiles: ["extras"]
    restart: unless-stopped
    networks:
      - proxy
    # tsdproxy discovers this container over the docker socket and serves it as
    # the tailnet node "dockge", terminating HTTPS on 443 -> dockge's 5001.
    expose:
      - "5001"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "dockge"
      tsdproxy.port.1: "443/https:5001/http"
      # Discovered by homepage over the docker socket and shown on the dashboard.
      homepage.group: "Infrastructure"
      homepage.name: "Dockge"
      homepage.icon: "dockge.png"
      homepage.href: "https://dockge.${TAILNET:?set TAILNET in .env}/"
      homepage.description: "Docker stack manager"
      # WUD: the "1" tag floats across 1.x releases, so track it by digest.
      wud.watch.digest: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockge_data:/app/data
      - /opt/stacks:/opt/stacks
    environment:
      - DOCKGE_STACKS_DIR=/opt/stacks
      - DOCKGE_ENABLE_CONSOLE=true

  # AIOStreams (Stremio addon aggregator). tsdproxy serves it as the tailnet
  # node "aiostreams", terminating HTTPS on 443 -> the app's 3000. State (sqlite
  # db at /app/data) lives in a named volume so it survives over a remote
  # DOCKER_HOST without host bind mounts.
  aiostreams:
    image: ghcr.io/viren070/aiostreams:latest
    container_name: aiostreams
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - "3000"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "aiostreams"
      tsdproxy.port.1: "443/https:3000/http"
      homepage.group: "Media"
      homepage.name: "AIOStreams"
      homepage.icon: "stremio.png"
      homepage.href: "https://aiostreams.${TAILNET:?set TAILNET in .env}/"
      homepage.description: "Stremio addon aggregator"
      # WUD: :latest isn't semver, so track this image by digest instead.
      wud.watch.digest: "true"
    volumes:
      - aiostreams_data:/app/data
    environment:
      # SECRET_KEY must be a 64-char hex string (32 bytes); generate with
      # `openssl rand -hex 32`.
      - SECRET_KEY=${AIOSTREAMS_SECRET_KEY:?set AIOSTREAMS_SECRET_KEY in .env}
      # BASE_URL is the addon's public URL (no trailing slash). Newer images
      # require it explicitly and exit if it's missing — they no longer derive
      # it from tsdproxy's forwarded Host/Proto headers. Must match the tailnet
      # node name (tsdproxy.name above) -> https://aiostreams.<tailnet>.ts.net
      - BASE_URL=${AIOSTREAMS_BASE_URL:?set AIOSTREAMS_BASE_URL in .env}

  # AIOManager (Stremio multi-account / addon manager). tsdproxy serves it as the
  # tailnet node "aiomanager", terminating HTTPS on 443 -> the app's 1610. Runs on
  # SQLite (DB_TYPE=sqlite) so no external DB is needed; the db and the
  # auto-generated ENCRYPTION_KEY live under DATA_DIR in a named volume, surviving
  # restarts over a remote DOCKER_HOST with no host bind mounts.
  aiomanager:
    image: ghcr.io/sonicx161/aiomanager:latest
    container_name: aiomanager
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - "1610"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "aiomanager"
      tsdproxy.port.1: "443/https:1610/http"
      homepage.group: "Media"
      homepage.name: "AIOManager"
      homepage.icon: "stremio.png"
      homepage.href: "https://aiomanager.${TAILNET:?set TAILNET in .env}/"
      homepage.description: "Stremio account & addon manager"
      # WUD: :latest isn't semver, so track this image by digest instead.
      wud.watch.digest: "true"
    volumes:
      - aiomanager_data:/app/data
    environment:
      - DB_TYPE=sqlite
      - DATA_DIR=/app/data
      # The browser-side config UI calls the API at the tailnet node origin, so
      # that origin has to be allow-listed for CORS.
      - CORS_ORIGINS=https://aiomanager.${TAILNET:?set TAILNET in .env}

  # AIOMetadata (power-user Stremio metadata aggregator). Needs Redis for its
  # metadata/catalog cache; this is the JigSawFr Docker-packaged build (multi-arch,
  # baked-in healthcheck). tsdproxy serves it as the tailnet node "aiometadata"
  # (HTTPS 443 -> 1337). The SQLite db lives under /app/addon/data in a named
  # volume, so it survives over a remote DOCKER_HOST with no host bind mounts.
  aiometadata:
    image: ghcr.io/jigsawfr/aiometadata-docker:latest
    container_name: aiometadata
    restart: unless-stopped
    # The 2.7.x image ships a stale ENTRYPOINT (`node dist/server.js`) but the
    # build output moved into dist/server/, so it crashes with
    # "Cannot find module '/app/dist/server.js'". Point it at the real entry
    # (matches package.json "main"/"start"). Drop this once upstream fixes it.
    entrypoint: ["node", "dist/server/server.js"]
    # The image runs as uid 1001 (nodejs) but doesn't pre-create
    # /app/addon/data, so the named-volume mountpoint is auto-created root-owned
    # and 1001 can't write the SQLite db ("unable to open database file"). Run as
    # root so the app owns its own data volume.
    user: root
    networks:
      - proxy
    expose:
      - "1337"
    depends_on:
      aiometadata_redis:
        condition: service_healthy
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "aiometadata"
      tsdproxy.port.1: "443/https:1337/http"
      homepage.group: "Media"
      homepage.name: "AIOMetadata"
      homepage.icon: "stremio.png"
      homepage.href: "https://aiometadata.${TAILNET:?set TAILNET in .env}/"
      homepage.description: "Stremio metadata aggregator"
      # WUD: :latest isn't semver, so track this image by digest instead.
      wud.watch.digest: "true"
    volumes:
      - aiometadata_data:/app/addon/data
    environment:
      - REDIS_URL=redis://aiometadata_redis:6379
      # Public addon URL (no trailing slash); must match the tailnet node name
      # (tsdproxy.name above) -> https://aiometadata.<tailnet>.ts.net
      - HOST_NAME=https://aiometadata.${TAILNET:?set TAILNET in .env}
      # TMDB key is required for movie/series metadata; secret comes from .env.
      - TMDB_API=${AIOMETADATA_TMDB_API:?set AIOMETADATA_TMDB_API in .env}
      # DATABASE_URI is mandatory (no default in 2.7.x). sqlite://<path> resolves
      # relative to /app; point it at the SQLite db inside the mounted volume.
      - DATABASE_URI=sqlite:///app/addon/data/addon.db
      # Optional TVDB key for series/anime metadata; without it TVDB lookups log
      # "TVDB API Key is not configured". Empty default so the addon still starts.
      - TVDB_API_KEY=${AIOMETADATA_TVDB_API_KEY:-}

  # Redis backing store for AIOMetadata's cache. Internal to the proxy network —
  # not fronted by tsdproxy. State persists in a named volume so the warmed cache
  # survives restarts without host bind mounts.
  aiometadata_redis:
    image: redis:alpine
    container_name: aiometadata_redis
    restart: unless-stopped
    networks:
      - proxy
    labels:
      # WUD: :alpine isn't semver, so track this image by digest instead.
      wud.watch.digest: "true"
    volumes:
      - aiometadata_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Watchly (Stremio recommendation-catalog addon). Builds taste-based catalog
  # rows from your watch history using TMDB metadata; all of its state is the
  # Redis cache below, so the app container itself is stateless. tsdproxy serves
  # it as the tailnet node "watchly" (HTTPS 443 -> the app's 8000).
  watchly:
    image: ghcr.io/timilsinabimal/watchly:latest
    container_name: watchly
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - "8000"
    depends_on:
      watchly_redis:
        condition: service_healthy
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "watchly"
      tsdproxy.port.1: "443/https:8000/http"
      homepage.group: "Media"
      homepage.name: "Watchly"
      homepage.icon: "stremio.png"
      homepage.href: "https://watchly.${TAILNET:?set TAILNET in .env}/"
      homepage.description: "Stremio recommendation catalogs"
      # WUD: :latest isn't semver, so track this image by digest instead.
      wud.watch.digest: "true"
    environment:
      - APP_ENV=production
      - PORT=8000
      - REDIS_URL=redis://watchly_redis:6379/0
      # Public addon URL (no trailing slash); used to build the manifest and OAuth
      # callbacks, so it must match the tailnet node name (tsdproxy.name above).
      - HOST_NAME=https://watchly.${TAILNET:?set TAILNET in .env}
      # TMDB key is required for catalog metadata; secret comes from .env.
      - TMDB_API_KEY=${WATCHLY_TMDB_API_KEY:?set WATCHLY_TMDB_API_KEY in .env}
      # Salt for token generation; secret comes from .env.
      - TOKEN_SALT=${WATCHLY_TOKEN_SALT:?set WATCHLY_TOKEN_SALT in .env}
      # Optional Trakt OAuth app (trakt.tv/oauth/applications, redirect URI
      # ${HOST_NAME}/auth/trakt/callback). When set, Trakt becomes a selectable
      # history source on /configure. Unset by default so Watchly still starts.
      - TRAKT_CLIENT_ID=${WATCHLY_TRAKT_CLIENT_ID:-}
      - TRAKT_CLIENT_SECRET=${WATCHLY_TRAKT_CLIENT_SECRET:-}

  # Redis backing store for Watchly (its only persistent state). Internal to the
  # proxy network — not fronted by tsdproxy. State persists in a named volume.
  watchly_redis:
    image: redis:alpine
    container_name: watchly_redis
    restart: unless-stopped
    networks:
      - proxy
    labels:
      # WUD: :alpine isn't semver, so track this image by digest instead.
      wud.watch.digest: "true"
    volumes:
      - watchly_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dozzle: real-time web log viewer for every container on this host. It reads
  # the docker socket (read-only — it only streams logs and metadata) and needs
  # no per-container config. tsdproxy serves it as the tailnet node "dozzle",
  # terminating HTTPS on 443 -> dozzle's 8080. dozzle_data persists auth/user
  # state across restarts without host bind mounts (remote DOCKER_HOST safe).
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    # Disabled: only runs when the "extras" profile is enabled
    # (`docker compose --profile extras up -d`).
    profiles: ["extras"]
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - "8080"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "dozzle"
      tsdproxy.port.1: "443/https:8080/http"
      homepage.group: "Infrastructure"
      homepage.name: "Dozzle"
      homepage.icon: "dozzle.png"
      homepage.href: "https://dozzle.${TAILNET:?set TAILNET in .env}/"
      homepage.description: "Container log viewer"
      # WUD: :latest isn't semver, so track this image by digest instead.
      wud.watch.digest: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dozzle_data:/data

  # WUD (What's Up Docker): watches the registry for newer images of every
  # running container, shows them in a web UI, and pings Telegram when an update
  # is available. Unlike Diun it has a dashboard, so it's exposed via tsdproxy as
  # the tailnet node "wud" (HTTPS 443 -> WUD's 3000) and surfaced on Homepage. A
  # default "local" watcher is auto-created from the mounted docker socket
  # (read-only — we only notify, never auto-update), so no watcher config is
  # needed. State lives in wud_data so it remembers what it has already flagged.
  wud:
    image: getwud/wud:latest
    container_name: wud
    # Disabled: only runs when the "extras" profile is enabled
    # (`docker compose --profile extras up -d`).
    profiles: ["extras"]
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - "3000"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "wud"
      tsdproxy.port.1: "443/https:3000/http"
      homepage.group: "Infrastructure"
      homepage.name: "WUD"
      homepage.icon: "whats-up-docker.png"
      homepage.href: "https://wud.${TAILNET:?set TAILNET in .env}/"
      homepage.description: "Docker image update tracker"
      # WUD watches itself too: :latest isn't semver, so track it by digest.
      wud.watch.digest: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - wud_data:/store
    environment:
      - TZ=Europe/Kyiv
      # Telegram trigger "1". Secrets come from .env.
      - WUD_TRIGGER_TELEGRAM_1_BOTTOKEN=${TELEGRAM_BOT_TOKEN:?set TELEGRAM_BOT_TOKEN in .env}
      - WUD_TRIGGER_TELEGRAM_1_CHATID=${TELEGRAM_CHAT_ID:?set TELEGRAM_CHAT_ID in .env}

  # Pi-hole (v6): network-wide DNS ad-blocker. Two faces with different reach:
  #  - Admin UI: v6 serves it from FTL's embedded webserver on port 80, which we
  #    `expose` on the proxy network so tsdproxy fronts it as the tailnet node
  #    "pihole" (HTTPS 443 -> 80). HTTP only, so this is the same pattern as the
  #    other apps.
  #  - DNS: port 53 can't ride an HTTP proxy, so it's published straight to the
  #    host (tcp+udp). Clients/routers point their resolver at the Docker host's
  #    IP:53. This is the one service that publishes a host port by necessity.
  # State (config, query DB, gravity/blocklists) lives in pihole_data:/etc/pihole
  # so it survives restarts without host bind mounts (remote DOCKER_HOST safe).
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    # v6 bundles an NTP client; without CAP_SYS_TIME it can't set the system
    # clock and logs "Insufficient permissions to set system time".
    cap_add:
      - SYS_TIME
    networks:
      - proxy
    # DNS to the host; UI stays internal (tsdproxy reaches :80 over proxy net).
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    expose:
      - "80"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "pihole"
      tsdproxy.port.1: "443/https:80/http"
      homepage.group: "Infrastructure"
      homepage.name: "Pi-hole"
      homepage.icon: "pi-hole.png"
      homepage.href: "https://pihole.${TAILNET:?set TAILNET in .env}/admin/"
      homepage.description: "Network-wide DNS ad-blocker"
      # WUD: :latest isn't semver, so track this image by digest instead.
      wud.watch.digest: "true"
    volumes:
      - pihole_data:/etc/pihole
    environment:
      - TZ=Europe/Kyiv
      # v6 renamed the admin password var; secret comes from .env.
      - FTLCONF_webserver_api_password=${PIHOLE_PASSWORD:?set PIHOLE_PASSWORD in .env}
      # In bridge mode FTL's default listeningMode (LOCAL) only answers queries
      # arriving on its own subnet, so LAN/tailnet clients reaching it through the
      # published :53 get nothing. "all" makes it answer on every interface.
      - FTLCONF_dns_listeningMode=all

  # Homepage: a single dashboard URL that auto-enumerates every app on this
  # host. It reads the docker socket and surfaces any container with homepage.*
  # labels (see dockge/aiostreams above). tsdproxy serves it as the tailnet node
  # "homepage", terminating HTTPS on 443 -> homepage's 3000.
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - "3000"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "homepage"
      tsdproxy.port.1: "443/https:3000/http"
      # WUD: :latest isn't semver, so track this image by digest instead.
      wud.watch.digest: "true"
    volumes:
      # Socket is needed for label-based service discovery; :ro is enough since
      # homepage only reads container metadata. Config volume keeps the
      # auto-created default files (bookmarks/services/widgets) across restarts.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - homepage_config:/app/config
    environment:
      # Mandatory host-allowlist guard. Homepage is reached as the tailnet node
      # "homepage", so permit that host (HTTPS terminates at tsdproxy).
      - HOMEPAGE_ALLOWED_HOSTS=homepage.${TAILNET:?set TAILNET in .env}
    configs:
      - source: homepage_docker
        target: /app/config/docker.yaml
      - source: homepage_settings
        target: /app/config/settings.yaml
      - source: homepage_services
        target: /app/config/services.yaml
      - source: homepage_bookmarks
        target: /app/config/bookmarks.yaml
