# Tailscale exposure via tsdproxy: one proxy joins the tailnet and serves any
# container labelled `tsdproxy.enable: "true"` as its own HTTPS node — no
# per-app sidecars. To expose a new app, put it on the `proxy` network and add
# the tsdproxy.* labels (see dockge below). Node state lives in a named volume
# and the auth key is passed via env, so this works over a remote DOCKER_HOST
# with no host bind mounts.

volumes:
  dockge_data:
    name: dockge_data
  tsdproxy_data:
  aiostreams_data:
  homepage_config:
  dozzle_data:
  wud_data:

networks:
  proxy:

# tsdproxy config injected as a file (not a host bind mount, so it still works
# over a remote DOCKER_HOST). The key setting is tryDockerInternalNetwork: true
# — without it tsdproxy reaches targets via host.docker.internal and the host's
# published port, but our apps only `expose` their port on the `proxy` network
# (nothing is published to the host), so it 502s. With it enabled, tsdproxy
# connects to the container's internal IP on the shared proxy network directly.
configs:
  tsdproxy_config:
    content: |
      defaultProxyProvider: default
      docker:
        local:
          host: unix:///var/run/docker.sock
          targetHostname: host.docker.internal
          tryDockerInternalNetwork: true
          defaultProxyProvider: default
      tailscale:
        providers:
          default:
            clientId: ${TS_CLIENT_ID:?set TS_CLIENT_ID in .env}
            clientSecret: ${TS_CLIENT_SECRET:?set TS_CLIENT_SECRET in .env}
            tags: "tag:homelab" # Optional if tags are defined in each proxy
        dataDir: /data/
      http:
        hostname: 0.0.0.0
        port: 8080
      log:
        level: info

  # Homepage reads its config from /app/config. We inject the two files that
  # matter declaratively (the rest are auto-created as empty defaults at
  # startup) so this works over a remote DOCKER_HOST with no host bind mounts.
  # docker.yaml points homepage at the host's docker socket; every container
  # carrying homepage.* labels is then auto-discovered — no services.yaml entries.
  homepage_docker:
    content: |
      my-docker:
        socket: /var/run/docker.sock
  homepage_settings:
    content: |
      title: Intranet
      headerStyle: clean
      layout:
        Infrastructure:
          style: row
          columns: 3
        Media:
          style: row
          columns: 3
  # Override the bundled sample files so their placeholder "My First Service"
  # entries don't show up — everything real comes from docker label discovery.
  homepage_services:
    content: |
      # Services are discovered from docker labels; nothing static here.
  homepage_bookmarks:
    content: |
      []

services:
  tsdproxy:
    image: almeidapaulopt/tsdproxy:2
    restart: unless-stopped
    networks:
      - proxy
    # WUD: the "2" tag floats across 2.x releases, so track it by digest.
    labels:
      wud.watch.digest: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - tsdproxy_data:/data
    # Lets tsdproxy resolve the Docker host gateway as a fallback target route.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # /config/tsdproxy.yaml is tsdproxy's default config path. The auth key is
    # only used at first registration; the tailnet node then persists in
    # tsdproxy_data (dataDir: /data) so it stays authenticated across restarts.
    configs:
      - source: tsdproxy_config
        target: /config/tsdproxy.yaml

  dockge:
    image: louislam/dockge:1
    restart: unless-stopped
    networks:
      - proxy
    # tsdproxy discovers this container over the docker socket and serves it as
    # the tailnet node "dockge", terminating HTTPS on 443 -> dockge's 5001.
    expose:
      - "5001"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "dockge"
      tsdproxy.port.1: "443/https:5001/http"
      # Discovered by homepage over the docker socket and shown on the dashboard.
      homepage.group: "Infrastructure"
      homepage.name: "Dockge"
      homepage.icon: "dockge.png"
      homepage.href: "https://dockge.${TAILNET:?set TAILNET in .env}/"
      homepage.description: "Docker stack manager"
      # WUD: the "1" tag floats across 1.x releases, so track it by digest.
      wud.watch.digest: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockge_data:/app/data
      - /opt/stacks:/opt/stacks
    environment:
      - DOCKGE_STACKS_DIR=/opt/stacks
      - DOCKGE_ENABLE_CONSOLE=true

  # AIOStreams (Stremio addon aggregator). tsdproxy serves it as the tailnet
  # node "aiostreams", terminating HTTPS on 443 -> the app's 3000. State (sqlite
  # db at /app/data) lives in a named volume so it survives over a remote
  # DOCKER_HOST without host bind mounts.
  aiostreams:
    image: ghcr.io/viren070/aiostreams:latest
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - "3000"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "aiostreams"
      tsdproxy.port.1: "443/https:3000/http"
      homepage.group: "Media"
      homepage.name: "AIOStreams"
      homepage.icon: "stremio.png"
      homepage.href: "https://aiostreams.${TAILNET:?set TAILNET in .env}/"
      homepage.description: "Stremio addon aggregator"
      # WUD: :latest isn't semver, so track this image by digest instead.
      wud.watch.digest: "true"
    volumes:
      - aiostreams_data:/app/data
    environment:
      # SECRET_KEY must be a 64-char hex string (32 bytes); generate with
      # `openssl rand -hex 32`.
      - SECRET_KEY=${AIOSTREAMS_SECRET_KEY:?set AIOSTREAMS_SECRET_KEY in .env}
      # BASE_URL is the addon's public URL (no trailing slash). Newer images
      # require it explicitly and exit if it's missing — they no longer derive
      # it from tsdproxy's forwarded Host/Proto headers. Must match the tailnet
      # node name (tsdproxy.name above) -> https://aiostreams.<tailnet>.ts.net
      - BASE_URL=${AIOSTREAMS_BASE_URL:?set AIOSTREAMS_BASE_URL in .env}

  # Dozzle: real-time web log viewer for every container on this host. It reads
  # the docker socket (read-only — it only streams logs and metadata) and needs
  # no per-container config. tsdproxy serves it as the tailnet node "dozzle",
  # terminating HTTPS on 443 -> dozzle's 8080. dozzle_data persists auth/user
  # state across restarts without host bind mounts (remote DOCKER_HOST safe).
  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - "8080"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "dozzle"
      tsdproxy.port.1: "443/https:8080/http"
      homepage.group: "Infrastructure"
      homepage.name: "Dozzle"
      homepage.icon: "dozzle.png"
      homepage.href: "https://dozzle.${TAILNET:?set TAILNET in .env}/"
      homepage.description: "Container log viewer"
      # WUD: :latest isn't semver, so track this image by digest instead.
      wud.watch.digest: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dozzle_data:/data

  # WUD (What's Up Docker): watches the registry for newer images of every
  # running container, shows them in a web UI, and pings Telegram when an update
  # is available. Unlike Diun it has a dashboard, so it's exposed via tsdproxy as
  # the tailnet node "wud" (HTTPS 443 -> WUD's 3000) and surfaced on Homepage. A
  # default "local" watcher is auto-created from the mounted docker socket
  # (read-only — we only notify, never auto-update), so no watcher config is
  # needed. State lives in wud_data so it remembers what it has already flagged.
  wud:
    image: getwud/wud:latest
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - "3000"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "wud"
      tsdproxy.port.1: "443/https:3000/http"
      homepage.group: "Infrastructure"
      homepage.name: "WUD"
      homepage.icon: "whats-up-docker.png"
      homepage.href: "https://wud.${TAILNET:?set TAILNET in .env}/"
      homepage.description: "Docker image update tracker"
      # WUD watches itself too: :latest isn't semver, so track it by digest.
      wud.watch.digest: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - wud_data:/store
    environment:
      - TZ=Europe/Kyiv
      # Telegram trigger "1". Secrets come from .env.
      - WUD_TRIGGER_TELEGRAM_1_BOTTOKEN=${TELEGRAM_BOT_TOKEN:?set TELEGRAM_BOT_TOKEN in .env}
      - WUD_TRIGGER_TELEGRAM_1_CHATID=${TELEGRAM_CHAT_ID:?set TELEGRAM_CHAT_ID in .env}

  # Homepage: a single dashboard URL that auto-enumerates every app on this
  # host. It reads the docker socket and surfaces any container with homepage.*
  # labels (see dockge/aiostreams above). tsdproxy serves it as the tailnet node
  # "homepage", terminating HTTPS on 443 -> homepage's 3000.
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - "3000"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "homepage"
      tsdproxy.port.1: "443/https:3000/http"
      # WUD: :latest isn't semver, so track this image by digest instead.
      wud.watch.digest: "true"
    volumes:
      # Socket is needed for label-based service discovery; :ro is enough since
      # homepage only reads container metadata. Config volume keeps the
      # auto-created default files (bookmarks/services/widgets) across restarts.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - homepage_config:/app/config
    environment:
      # Mandatory host-allowlist guard. Homepage is reached as the tailnet node
      # "homepage", so permit that host (HTTPS terminates at tsdproxy).
      - HOMEPAGE_ALLOWED_HOSTS=homepage.${TAILNET:?set TAILNET in .env}
    configs:
      - source: homepage_docker
        target: /app/config/docker.yaml
      - source: homepage_settings
        target: /app/config/settings.yaml
      - source: homepage_services
        target: /app/config/services.yaml
      - source: homepage_bookmarks
        target: /app/config/bookmarks.yaml
