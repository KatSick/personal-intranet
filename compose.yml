# Tailscale exposure via tsdproxy: one proxy joins the tailnet and serves any
# container labelled `tsdproxy.enable: "true"` as its own HTTPS node — no
# per-app sidecars. To expose a new app, put it on the `proxy` network and add
# the tsdproxy.* labels (see dockge below). Node state lives in a named volume
# and the auth key is passed via env, so this works over a remote DOCKER_HOST
# with no host bind mounts.

volumes:
  dockge_data:
    name: dockge_data
  tsdproxy_data:
  aiostreams_data:

networks:
  proxy:

# tsdproxy config injected as a file (not a host bind mount, so it still works
# over a remote DOCKER_HOST). The key setting is tryDockerInternalNetwork: true
# — without it tsdproxy reaches targets via host.docker.internal and the host's
# published port, but our apps only `expose` their port on the `proxy` network
# (nothing is published to the host), so it 502s. With it enabled, tsdproxy
# connects to the container's internal IP on the shared proxy network directly.
configs:
  tsdproxy_config:
    content: |
      defaultProxyProvider: default
      docker:
        local:
          host: unix:///var/run/docker.sock
          targetHostname: host.docker.internal
          tryDockerInternalNetwork: true
          defaultProxyProvider: default
      tailscale:
        providers:
          default:
            clientId: ${TS_CLIENT_ID:?set TS_CLIENT_ID in .env}
            clientSecret: ${TS_CLIENT_SECRET:?set TS_CLIENT_SECRET in .env}
            tags: "tag:homelab" # Optional if tags are defined in each proxy
        dataDir: /data/
      http:
        hostname: 0.0.0.0
        port: 8080
      log:
        level: info

services:
  tsdproxy:
    image: almeidapaulopt/tsdproxy:2
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - tsdproxy_data:/data
    # Lets tsdproxy resolve the Docker host gateway as a fallback target route.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # /config/tsdproxy.yaml is tsdproxy's default config path. The auth key is
    # only used at first registration; the tailnet node then persists in
    # tsdproxy_data (dataDir: /data) so it stays authenticated across restarts.
    configs:
      - source: tsdproxy_config
        target: /config/tsdproxy.yaml

  dockge:
    image: louislam/dockge:1
    restart: unless-stopped
    networks:
      - proxy
    # tsdproxy discovers this container over the docker socket and serves it as
    # the tailnet node "dockge", terminating HTTPS on 443 -> dockge's 5001.
    expose:
      - "5001"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "dockge"
      tsdproxy.port.1: "443/https:5001/http"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockge_data:/app/data
      - /opt/stacks:/opt/stacks
    environment:
      - DOCKGE_STACKS_DIR=/opt/stacks
      - DOCKGE_ENABLE_CONSOLE=true

  # AIOStreams (Stremio addon aggregator). tsdproxy serves it as the tailnet
  # node "aiostreams", terminating HTTPS on 443 -> the app's 3000. State (sqlite
  # db at /app/data) lives in a named volume so it survives over a remote
  # DOCKER_HOST without host bind mounts.
  aiostreams:
    image: ghcr.io/viren070/aiostreams:latest
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - "3000"
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "aiostreams"
      tsdproxy.port.1: "443/https:3000/http"
    volumes:
      - aiostreams_data:/app/data
    environment:
      # SECRET_KEY must be a 64-char hex string (32 bytes); generate with
      # `openssl rand -hex 32`.
      - SECRET_KEY=${AIOSTREAMS_SECRET_KEY:?set AIOSTREAMS_SECRET_KEY in .env}
      # BASE_URL is the addon's public URL (no trailing slash). Newer images
      # require it explicitly and exit if it's missing — they no longer derive
      # it from tsdproxy's forwarded Host/Proto headers. Must match the tailnet
      # node name (tsdproxy.name above) -> https://aiostreams.<tailnet>.ts.net
      - BASE_URL=${AIOSTREAMS_BASE_URL:?set AIOSTREAMS_BASE_URL in .env}
